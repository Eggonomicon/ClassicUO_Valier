name: Valier ClassicUO Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Verify branding assets exist
        shell: pwsh
        run: |
          $required = @(
            'branding/ValierIcon.ico',
            'launch/ValierClassicUOClient.bat',
            'settings/Valier.settings.template.json'
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Missing required file: $path"
            }
          }

      - name: Build and package
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\build_release_windows.ps1 -Version $env:GITHUB_REF_NAME

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ValierClassicUOClient-win-x64
          path: |
            release/ValierClassicUOClient-win-x64.zip
            release/patch-manifest.json

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/ValierClassicUOClient-win-x64.zip
            release/patch-manifest.json
          generate_release_notes: true
